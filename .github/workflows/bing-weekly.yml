name: Bing weekly report

on:
  workflow_dispatch: {}
  schedule:
    - cron: "55 6 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/bing-weekly.yml"
      - "scripts/bing_weekly.py"

concurrency:
  group: bing-weekly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run Bing weekly report
        env:
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
          BING_SITE_URL: ${{ secrets.BING_SITE_URL }}
          BING_ROWS: "250"
          BING_PAIR_PAGES: "20"
        run: python scripts/bing_weekly.py

      - name: Commit & push (if changed)
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(bing): weekly report"
            for i in 1 2 3; do
              git pull --rebase origin main
              if git push; then
                exit 0
              fi
              sleep 2
            done
            exit 1
          else
            echo "No changes."
          fi
