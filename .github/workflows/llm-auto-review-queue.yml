name: LLM auto review queue

on:
  workflow_dispatch:
    inputs:
      model:
        description: "OpenAI model for the no-write auto-review queue."
        required: false
        default: "gpt-5.4-mini"
      max_chains:
        description: "Maximum top candidates to auto-review."
        required: false
        default: "3"
      include_existing:
        description: "Rerun topics that already have completed chain summaries."
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "20 8 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/llm-auto-review-queue.yml"
      - "automation/memory/source_registry.json"
      - "automation/pipeline.py"
      - "automation/workers/external_evidence_collect.py"
      - "automation/workers/external_evidence_refresh.py"
      - "automation/workers/external_search_collect.py"
      - "automation/workers/external_scout.py"
      - "automation/workers/llm_*.py"
      - "automation/reports/llm_*.py"
      - "content/gsc/latest-gsc-agent-signals.json"
      - "content/bing/latest-bing-agent-signals.json"

concurrency:
  group: llm-auto-review-queue-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  queue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run no-write LLM auto review queue
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event.inputs.model || 'gpt-5.4-mini' }}
          MAX_CHAINS: ${{ github.event.inputs.max_chains || '3' }}
          INCLUDE_EXISTING: ${{ github.event.inputs.include_existing || 'false' }}
        run: |
          set -euo pipefail
          mkdir -p automation/reports/llm-auto-review-queue
          python3 automation/pipeline.py external-scout \
            --output-dir automation/reports/llm-auto-review-queue \
            --basename external-scout \
            --json | tee automation/reports/llm-auto-review-queue/external-scout-run-summary.json
          python3 automation/pipeline.py external-evidence-refresh \
            --external-scout automation/reports/llm-auto-review-queue/external-scout.json \
            --output-dir automation/reports/llm-auto-review-queue \
            --basename external-evidence-refresh \
            --json | tee automation/reports/llm-auto-review-queue/external-evidence-refresh-run-summary.json
          python3 automation/pipeline.py external-evidence-collect \
            --provider fetch \
            --evidence-refresh automation/reports/llm-auto-review-queue/external-evidence-refresh.json \
            --output-dir automation/reports/llm-auto-review-queue \
            --basename external-evidence-collect \
            --json | tee automation/reports/llm-auto-review-queue/external-evidence-collect-run-summary.json
          python3 automation/pipeline.py external-search-collect \
            --provider openai \
            --evidence-refresh automation/reports/llm-auto-review-queue/external-evidence-refresh.json \
            --output-dir automation/reports/llm-auto-review-queue \
            --basename external-search-collect \
            --limit 6 \
            --per-query-results 3 \
            --proposal-limit 10 \
            --json | tee automation/reports/llm-auto-review-queue/external-search-collect-run-summary.json
          cmd=(
            python3 automation/pipeline.py llm-auto-review-queue
            --provider openai
            --external-proposals automation/reports/llm-auto-review-queue/external-scout.json
            --external-proposals automation/reports/llm-auto-review-queue/external-search-collect.json
            --output-dir automation/reports/llm-auto-review-queue
            --max-chains "$MAX_CHAINS"
            --json
          )
          if [[ "$INCLUDE_EXISTING" == "true" ]]; then
            cmd+=(--include-existing)
          fi
          "${cmd[@]}" | tee automation/reports/llm-auto-review-queue/run-summary.json

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## LLM Auto Review Queue"
            echo
            echo "- Mode: no-write"
            echo "- Output directory: \`automation/reports/llm-auto-review-queue\`"
            echo "- External Scout proposals: \`automation/reports/llm-auto-review-queue/external-scout.json\`"
            echo "- External evidence queue: \`automation/reports/llm-auto-review-queue/external-evidence-refresh.json\`"
            echo "- External evidence collection: \`automation/reports/llm-auto-review-queue/external-evidence-collect.json\`"
            echo "- External search collection: \`automation/reports/llm-auto-review-queue/external-search-collect.json\`"
            echo "- Content/backlog/manifests/PRs modified: \`false\`"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          summary_path = Path("automation/reports/llm-auto-review-queue/run-summary.json")
          if not summary_path.exists():
              print("No run summary was written.")
              raise SystemExit(0)
          data = json.loads(summary_path.read_text())
          print(f"- State: `{data.get('state')}`")
          print(f"- Candidate topics: `{data.get('candidate_topic_count')}`")
          print(f"- Queued topics: `{data.get('queued_topic_count')}`")
          print(f"- Completed items: `{data.get('completed_item_count')}`")
          print(f"- Failed items: `{data.get('failed_item_count')}`")
          print(f"- Skipped existing: `{data.get('skipped_existing_count')}`")
          print(f"- Queue markdown: `{data.get('markdown_path')}`")
          PY

      - name: Upload LLM auto review queue artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-auto-review-queue-${{ github.run_number }}
          path: automation/reports/llm-auto-review-queue/
          if-no-files-found: error

      - name: Commit queue artifacts (if changed)
        if: success()
        run: |
          if [[ -n "$(git status --porcelain automation/reports/llm-auto-review-queue)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add automation/reports/llm-auto-review-queue
            git commit -m "chore(llm): auto review queue"
            for i in 1 2 3; do
              git pull --rebase origin main
              if git push; then
                exit 0
              fi
              sleep 2
            done
            exit 1
          else
            echo "No queue artifact changes."
          fi
