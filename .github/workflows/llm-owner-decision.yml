name: LLM owner decision

on:
  issue_comment:
    types: [created]

concurrency:
  group: llm-owner-decision-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  decision:
    if: >
      github.event.issue.pull_request == null &&
      github.event.issue.title == 'LLM Owner Digest: Action Needed' &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      ) &&
      (
        startsWith(github.event.comment.body, '/monitor ') ||
        startsWith(github.event.comment.body, '/reject ') ||
        startsWith(github.event.comment.body, '/approve-chain ') ||
        startsWith(github.event.comment.body, '/approve-intake ') ||
        startsWith(github.event.comment.body, '/approve-run-plan ') ||
        startsWith(github.event.comment.body, '/dry-run-manifest ') ||
        startsWith(github.event.comment.body, '/approve-manifest ') ||
        startsWith(github.event.comment.body, '/review-run ') ||
        startsWith(github.event.comment.body, '/brief-run ') ||
        startsWith(github.event.comment.body, '/patch-plan-run ') ||
        startsWith(github.event.comment.body, '/propose-run ') ||
        startsWith(github.event.comment.body, '/approve-proposal ') ||
        startsWith(github.event.comment.body, '/preview-apply ')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Record owner decision from issue comment
        if: >
          startsWith(github.event.comment.body, '/monitor ') ||
          startsWith(github.event.comment.body, '/reject ') ||
          startsWith(github.event.comment.body, '/approve-chain ')
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          mkdir -p automation/reports/llm-owner-decision-gha
          python3 automation/pipeline.py llm-issue-decision \
            --comment-body "$COMMENT_BODY" \
            --comment-author "$COMMENT_AUTHOR" \
            --author-association "$AUTHOR_ASSOCIATION" \
            --issue-title "$ISSUE_TITLE" \
            --discovery automation/reports/llm-auto-review-queue/llm-auto-review-topic-discovery.json \
            --summary-output automation/reports/llm-owner-decision-gha/decision-summary.json \
            --markdown-output automation/reports/llm-owner-decision-gha/decision-summary.md \
            --json | tee automation/reports/llm-owner-decision-gha/run-summary.json

      - name: Record owner intake from issue comment
        if: startsWith(github.event.comment.body, '/approve-intake ')
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          mkdir -p automation/reports/llm-owner-intake-gha
          python3 automation/pipeline.py llm-issue-intake \
            --comment-body "$COMMENT_BODY" \
            --comment-author "$COMMENT_AUTHOR" \
            --author-association "$AUTHOR_ASSOCIATION" \
            --issue-title "$ISSUE_TITLE" \
            --reports-dir automation/reports \
            --summary-output automation/reports/llm-owner-intake-gha/intake-summary.json \
            --markdown-output automation/reports/llm-owner-intake-gha/intake-summary.md \
            --json | tee automation/reports/llm-owner-intake-gha/run-summary.json

      - name: Record owner run-plan from issue comment
        if: startsWith(github.event.comment.body, '/approve-run-plan ')
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          mkdir -p automation/reports/llm-owner-run-plan-gha
          python3 automation/pipeline.py llm-issue-run-plan \
            --comment-body "$COMMENT_BODY" \
            --comment-author "$COMMENT_AUTHOR" \
            --author-association "$AUTHOR_ASSOCIATION" \
            --issue-title "$ISSUE_TITLE" \
            --reports-dir automation/reports \
            --summary-output automation/reports/llm-owner-run-plan-gha/run-plan-summary.json \
            --markdown-output automation/reports/llm-owner-run-plan-gha/run-plan-summary.md \
            --json | tee automation/reports/llm-owner-run-plan-gha/run-summary.json

      - name: Record owner manifest from issue comment
        if: >
          startsWith(github.event.comment.body, '/dry-run-manifest ') ||
          startsWith(github.event.comment.body, '/approve-manifest ')
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          mkdir -p automation/reports/llm-owner-manifest-gha
          python3 automation/pipeline.py llm-issue-manifest \
            --comment-body "$COMMENT_BODY" \
            --comment-author "$COMMENT_AUTHOR" \
            --author-association "$AUTHOR_ASSOCIATION" \
            --issue-title "$ISSUE_TITLE" \
            --reports-dir automation/reports \
            --manifest-dir automation/manifests \
            --summary-output automation/reports/llm-owner-manifest-gha/manifest-summary.json \
            --markdown-output automation/reports/llm-owner-manifest-gha/manifest-summary.md \
            --json | tee automation/reports/llm-owner-manifest-gha/run-summary.json

      - name: Run owner-approved manifest lifecycle from issue comment
        if: >
          startsWith(github.event.comment.body, '/review-run ') ||
          startsWith(github.event.comment.body, '/brief-run ') ||
          startsWith(github.event.comment.body, '/patch-plan-run ') ||
          startsWith(github.event.comment.body, '/propose-run ')
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          mkdir -p automation/reports/llm-owner-lifecycle-gha
          python3 automation/pipeline.py llm-issue-lifecycle \
            --comment-body "$COMMENT_BODY" \
            --comment-author "$COMMENT_AUTHOR" \
            --author-association "$AUTHOR_ASSOCIATION" \
            --issue-title "$ISSUE_TITLE" \
            --manifest-dir automation/manifests \
            --output-dir automation/reports \
            --summary-output automation/reports/llm-owner-lifecycle-gha/lifecycle-summary.json \
            --markdown-output automation/reports/llm-owner-lifecycle-gha/lifecycle-summary.md \
            --json | tee automation/reports/llm-owner-lifecycle-gha/run-summary.json

      - name: Record owner proposal approval from issue comment
        if: startsWith(github.event.comment.body, '/approve-proposal ')
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          mkdir -p automation/reports/llm-owner-proposal-approval-gha
          python3 automation/pipeline.py llm-issue-proposal-approval \
            --comment-body "$COMMENT_BODY" \
            --comment-author "$COMMENT_AUTHOR" \
            --author-association "$AUTHOR_ASSOCIATION" \
            --issue-title "$ISSUE_TITLE" \
            --manifest-dir automation/manifests \
            --output-dir automation/reports \
            --summary-output automation/reports/llm-owner-proposal-approval-gha/proposal-approval-summary.json \
            --markdown-output automation/reports/llm-owner-proposal-approval-gha/proposal-approval-summary.md \
            --json | tee automation/reports/llm-owner-proposal-approval-gha/run-summary.json

      - name: Render owner-approved apply preview from issue comment
        if: startsWith(github.event.comment.body, '/preview-apply ')
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          mkdir -p automation/reports/llm-owner-apply-preview-gha
          python3 automation/pipeline.py llm-issue-apply-preview \
            --comment-body "$COMMENT_BODY" \
            --comment-author "$COMMENT_AUTHOR" \
            --author-association "$AUTHOR_ASSOCIATION" \
            --issue-title "$ISSUE_TITLE" \
            --manifest-dir automation/manifests \
            --output-dir automation/reports \
            --summary-output automation/reports/llm-owner-apply-preview-gha/apply-preview-summary.json \
            --markdown-output automation/reports/llm-owner-apply-preview-gha/apply-preview-summary.md \
            --json | tee automation/reports/llm-owner-apply-preview-gha/run-summary.json

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## LLM Owner Handoff"
            echo
            echo "- Mode: no-write"
            echo "- Trigger: owner issue comment"
            echo "- Public content/backlog/PRs modified: \`false\`"
            echo "- Planned manifest creation allowed only by \`/approve-manifest\`"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          path = Path("automation/reports/llm-owner-decision-gha/decision-summary.json")
          if not path.exists():
              print("No decision summary was written.")
          else:
              data = json.loads(path.read_text())
              print(f"- Decision state: `{data.get('state')}`")
              print(f"- Topic: `{data.get('topic_id')}`")
              print(f"- Decision: `{data.get('decision_state')}`")
              print(f"- Allows worker chain: `{data.get('allows_worker_chain')}`")
              print(f"- Decision artifact: `{data.get('decision_output_path')}`")
              if data.get("errors"):
                  print("- Decision errors:")
                  for error in data["errors"]:
                      print(f"  - {error}")
          intake_path = Path("automation/reports/llm-owner-intake-gha/intake-summary.json")
          if intake_path.exists():
              intake = json.loads(intake_path.read_text())
              print(f"- Intake command state: `{intake.get('state')}`")
              print(f"- Intake topic: `{intake.get('topic_id')}`")
              print(f"- Intake artifact: `{intake.get('intake_output_path')}`")
              if intake.get("errors"):
                  print("- Intake errors:")
                  for error in intake["errors"]:
                      print(f"  - {error}")
          run_plan_path = Path("automation/reports/llm-owner-run-plan-gha/run-plan-summary.json")
          if run_plan_path.exists():
              run_plan = json.loads(run_plan_path.read_text())
              print(f"- Run-plan command state: `{run_plan.get('state')}`")
              print(f"- Run-plan topic: `{run_plan.get('topic_id')}`")
              print(f"- Run-plan artifact: `{run_plan.get('run_plan_output_path')}`")
              if run_plan.get("errors"):
                  print("- Run-plan errors:")
                  for error in run_plan["errors"]:
                      print(f"  - {error}")
          manifest_path = Path("automation/reports/llm-owner-manifest-gha/manifest-summary.json")
          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text())
              print(f"- Manifest command state: `{manifest.get('state')}`")
              print(f"- Manifest topic: `{manifest.get('topic_id')}`")
              print(f"- Manifest path: `{manifest.get('manifest_path')}`")
              print(f"- Allows manifest creation: `{manifest.get('allows_manifest_creation')}`")
              if manifest.get("errors"):
                  print("- Manifest errors:")
                  for error in manifest["errors"]:
                      print(f"  - {error}")
          lifecycle_path = Path("automation/reports/llm-owner-lifecycle-gha/lifecycle-summary.json")
          if lifecycle_path.exists():
              lifecycle = json.loads(lifecycle_path.read_text())
              print(f"- Lifecycle command state: `{lifecycle.get('state')}`")
              print(f"- Lifecycle run ID: `{lifecycle.get('run_id')}`")
              print(f"- Lifecycle command: `{lifecycle.get('command')}`")
              print(f"- Manifest path: `{lifecycle.get('manifest_path')}`")
              print(f"- Before status: `{lifecycle.get('before_status')}`")
              print(f"- After status: `{lifecycle.get('after_status')}`")
              if lifecycle.get("errors"):
                  print("- Lifecycle errors:")
                  for error in lifecycle["errors"]:
                      print(f"  - {error}")
          proposal_approval_path = Path("automation/reports/llm-owner-proposal-approval-gha/proposal-approval-summary.json")
          if proposal_approval_path.exists():
              approval = json.loads(proposal_approval_path.read_text())
              print(f"- Proposal approval state: `{approval.get('state')}`")
              print(f"- Proposal approval run ID: `{approval.get('run_id')}`")
              print(f"- Manifest path: `{approval.get('manifest_path')}`")
              print(f"- Before status: `{approval.get('before_status')}`")
              print(f"- After status: `{approval.get('after_status')}`")
              print(f"- Approved specs: `{approval.get('approved_spec_count')}`")
              print(f"- Allows apply-preview: `{approval.get('allows_apply_preview')}`")
              if approval.get("errors"):
                  print("- Proposal approval errors:")
                  for error in approval["errors"]:
                      print(f"  - {error}")
          apply_preview_path = Path("automation/reports/llm-owner-apply-preview-gha/apply-preview-summary.json")
          if apply_preview_path.exists():
              preview = json.loads(apply_preview_path.read_text())
              print(f"- Apply preview state: `{preview.get('state')}`")
              print(f"- Apply preview run ID: `{preview.get('run_id')}`")
              print(f"- Manifest path: `{preview.get('manifest_path')}`")
              print(f"- Before status: `{preview.get('before_status')}`")
              print(f"- After status: `{preview.get('after_status')}`")
              print(f"- Approved specs: `{preview.get('approved_specs_count')}`")
              print(f"- Preview report: `{preview.get('preview_markdown')}`")
              if preview.get("errors"):
                  print("- Apply preview errors:")
                  for error in preview["errors"]:
                      print(f"  - {error}")
          PY

      - name: Run approved no-write worker chain
        if: success() && startsWith(github.event.comment.body, '/approve-chain ')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/decision_path.txt
          import json
          from pathlib import Path

          path = Path("automation/reports/llm-owner-decision-gha/decision-summary.json")
          data = json.loads(path.read_text())
          if data.get("allows_worker_chain") and data.get("decision_output_path"):
              print(data["decision_output_path"])
          PY
          decision_path="$(cat /tmp/decision_path.txt)"
          if [[ -z "$decision_path" ]]; then
            echo "Decision does not allow worker-chain replay; skipping."
            exit 0
          fi
          mkdir -p automation/reports/llm-worker-chain-gha
          python3 automation/pipeline.py llm-worker-chain \
            --from-decision "$decision_path" \
            --provider openai \
            --output-dir automation/reports/llm-worker-chain-gha \
            --json | tee automation/reports/llm-worker-chain-gha/run-summary.json

      - name: Persist owner-approved worker chain summary
        if: success() && startsWith(github.event.comment.body, '/approve-chain ')
        run: |
          set -euo pipefail
          mkdir -p automation/reports/llm-owner-decision-chains
          if ls automation/reports/llm-worker-chain-gha/llm-worker-chain-*.json >/dev/null 2>&1; then
            cp automation/reports/llm-worker-chain-gha/llm-worker-chain-*.json automation/reports/llm-owner-decision-chains/
          fi
          if ls automation/reports/llm-worker-chain-gha/llm-worker-chain-*.md >/dev/null 2>&1; then
            cp automation/reports/llm-worker-chain-gha/llm-worker-chain-*.md automation/reports/llm-owner-decision-chains/
          fi

      - name: Write worker-chain summary
        if: always()
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          path = Path("automation/reports/llm-worker-chain-gha/run-summary.json")
          if not path.exists():
              print("- Worker chain: `not run`")
              raise SystemExit(0)
          data = json.loads(path.read_text())
          print(f"- Worker chain state: `{data.get('state')}`")
          print(f"- Worker chain topic: `{data.get('source_topic_id')}`")
          print(f"- Worker chain verdict: `{data.get('review_verdict')}`")
          print(f"- Worker chain risk: `{data.get('risk_level')}`")
          print(f"- Owner approval required: `{data.get('owner_approval_required')}`")
          PY

      - name: Reply to owner issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          token = os.environ["GITHUB_TOKEN"]
          api_url = os.environ["GITHUB_API_URL"].rstrip("/")
          repo = os.environ["GITHUB_REPOSITORY"]
          issue_number = os.environ["ISSUE_NUMBER"]
          workflow_url = os.environ["WORKFLOW_RUN_URL"]

          decision_path = Path("automation/reports/llm-owner-decision-gha/decision-summary.json")
          intake_path = Path("automation/reports/llm-owner-intake-gha/intake-summary.json")
          run_plan_path = Path("automation/reports/llm-owner-run-plan-gha/run-plan-summary.json")
          manifest_path = Path("automation/reports/llm-owner-manifest-gha/manifest-summary.json")
          lifecycle_path = Path("automation/reports/llm-owner-lifecycle-gha/lifecycle-summary.json")
          proposal_approval_path = Path("automation/reports/llm-owner-proposal-approval-gha/proposal-approval-summary.json")
          apply_preview_path = Path("automation/reports/llm-owner-apply-preview-gha/apply-preview-summary.json")
          chain_path = Path("automation/reports/llm-worker-chain-gha/run-summary.json")
          lines = [
              "## LLM owner handoff result",
              "",
              "Mode: `no-write`",
              "",
          ]
          if decision_path.exists():
              decision = json.loads(decision_path.read_text())
              lines.extend(
                  [
                      f"- State: `{decision.get('state', '')}`",
                      f"- Topic: `{decision.get('topic_id', '')}`",
                      f"- Decision: `{decision.get('decision_state', '')}`",
                      f"- Allows worker chain: `{str(decision.get('allows_worker_chain', False)).lower()}`",
                      f"- Decision artifact: `{decision.get('decision_output_path', '')}`",
                  ]
              )
              if decision.get("errors"):
                  lines.append("- Errors:")
                  for error in decision["errors"]:
                      lines.append(f"  - {error}")
          else:
              if (
                  not intake_path.exists()
                  and not run_plan_path.exists()
                  and not manifest_path.exists()
                  and not lifecycle_path.exists()
                  and not proposal_approval_path.exists()
                  and not apply_preview_path.exists()
              ):
                  lines.append("- State: `blocked`")
                  lines.append("- Errors:")
                  lines.append(
                      "  - No decision, intake, run-plan, manifest, lifecycle, proposal approval, or apply preview summary artifact was written."
                  )

          if intake_path.exists():
              intake = json.loads(intake_path.read_text())
              lines.extend(
                  [
                      "",
                      "Intake:",
                      "",
                      f"- State: `{intake.get('state', '')}`",
                      f"- Topic: `{intake.get('topic_id', '')}`",
                      f"- Source chain: `{intake.get('source_chain', '')}`",
                      f"- Intake artifact: `{intake.get('intake_output_path', '')}`",
                      f"- Allows content edit: `{str(intake.get('allows_content_edit', False)).lower()}`",
                  ]
              )
              if intake.get("errors"):
                  lines.append("- Intake errors:")
                  for error in intake["errors"]:
                      lines.append(f"  - {error}")

          if run_plan_path.exists():
              run_plan = json.loads(run_plan_path.read_text())
              lines.extend(
                  [
                      "",
                      "Run plan:",
                      "",
                      f"- State: `{run_plan.get('state', '')}`",
                      f"- Topic: `{run_plan.get('topic_id', '')}`",
                      f"- Source intake: `{run_plan.get('source_intake', '')}`",
                      f"- Run-plan artifact: `{run_plan.get('run_plan_output_path', '')}`",
                      f"- Allows content edit: `{str(run_plan.get('allows_content_edit', False)).lower()}`",
                      f"- Allows manifest creation: `{str(run_plan.get('allows_manifest_creation', False)).lower()}`",
                  ]
              )
              if run_plan.get("errors"):
                  lines.append("- Run-plan errors:")
                  for error in run_plan["errors"]:
                      lines.append(f"  - {error}")

          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text())
              lines.extend(
                  [
                      "",
                      "Manifest:",
                      "",
                      f"- State: `{manifest.get('state', '')}`",
                      f"- Topic: `{manifest.get('topic_id', '')}`",
                      f"- Source run-plan: `{manifest.get('source_run_plan', '')}`",
                      f"- Run ID: `{manifest.get('run_id', '')}`",
                      f"- Manifest path: `{manifest.get('manifest_path', '')}`",
                      f"- Dry run: `{str(manifest.get('dry_run', False)).lower()}`",
                      f"- Allows content edit: `{str(manifest.get('allows_content_edit', False)).lower()}`",
                      f"- Allows manifest creation: `{str(manifest.get('allows_manifest_creation', False)).lower()}`",
                  ]
              )
              if manifest.get("errors"):
                  lines.append("- Manifest errors:")
                  for error in manifest["errors"]:
                      lines.append(f"  - {error}")

          if lifecycle_path.exists():
              lifecycle = json.loads(lifecycle_path.read_text())
              lines.extend(
                  [
                      "",
                      "Lifecycle:",
                      "",
                      f"- State: `{lifecycle.get('state', '')}`",
                      f"- Command: `{lifecycle.get('command', '')}`",
                      f"- Run ID: `{lifecycle.get('run_id', '')}`",
                      f"- Manifest path: `{lifecycle.get('manifest_path', '')}`",
                      f"- Before status: `{lifecycle.get('before_status', '')}`",
                      f"- After status: `{lifecycle.get('after_status', '')}`",
                      f"- Allows content edit: `{str(lifecycle.get('allows_content_edit', False)).lower()}`",
                      f"- Allows manifest mutation: `{str(lifecycle.get('allows_manifest_mutation', False)).lower()}`",
                  ]
              )
              if lifecycle.get("errors"):
                  lines.append("- Lifecycle errors:")
                  for error in lifecycle["errors"]:
                      lines.append(f"  - {error}")

          if proposal_approval_path.exists():
              approval = json.loads(proposal_approval_path.read_text())
              lines.extend(
                  [
                      "",
                      "Proposal approval:",
                      "",
                      f"- State: `{approval.get('state', '')}`",
                      f"- Run ID: `{approval.get('run_id', '')}`",
                      f"- Manifest path: `{approval.get('manifest_path', '')}`",
                      f"- Before status: `{approval.get('before_status', '')}`",
                      f"- After status: `{approval.get('after_status', '')}`",
                      f"- Approved specs: `{approval.get('approved_spec_count', 0)}`",
                      f"- Exact specs: `{approval.get('exact_spec_count', 0)}`",
                      f"- Proposal report: `{approval.get('proposal_markdown', '')}`",
                      f"- Allows content edit: `{str(approval.get('allows_content_edit', False)).lower()}`",
                      f"- Allows apply-preview: `{str(approval.get('allows_apply_preview', False)).lower()}`",
                      f"- Allows apply-approved: `{str(approval.get('allows_apply_approved', False)).lower()}`",
                  ]
              )
              if approval.get("errors"):
                  lines.append("- Proposal approval errors:")
                  for error in approval["errors"]:
                      lines.append(f"  - {error}")

          if apply_preview_path.exists():
              preview = json.loads(apply_preview_path.read_text())
              lines.extend(
                  [
                      "",
                      "Apply preview:",
                      "",
                      f"- State: `{preview.get('state', '')}`",
                      f"- Run ID: `{preview.get('run_id', '')}`",
                      f"- Manifest path: `{preview.get('manifest_path', '')}`",
                      f"- Before status: `{preview.get('before_status', '')}`",
                      f"- After status: `{preview.get('after_status', '')}`",
                      f"- Preview report: `{preview.get('preview_markdown', '')}`",
                      f"- Approved specs: `{preview.get('approved_specs_count', 0)}`",
                      f"- Preview warnings: `{preview.get('preview_warning_count', 0)}`",
                      f"- Manifest ready for apply-approved: `{str(preview.get('manifest_ready_for_apply_approved', False)).lower()}`",
                      f"- Allows content edit: `{str(preview.get('allows_content_edit', False)).lower()}`",
                      f"- Runs apply-approved: `{str(preview.get('runs_apply_approved', False)).lower()}`",
                  ]
              )
              if preview.get("errors"):
                  lines.append("- Apply preview errors:")
                  for error in preview["errors"]:
                      lines.append(f"  - {error}")

          if chain_path.exists():
              chain = json.loads(chain_path.read_text())
              lines.extend(
                  [
                      "",
                      "Worker chain:",
                      "",
                      f"- State: `{chain.get('state', '')}`",
                      f"- Topic: `{chain.get('source_topic_id', '')}`",
                      f"- Verdict: `{chain.get('review_verdict', '')}`",
                      f"- Risk: `{chain.get('risk_level', '')}`",
                      f"- Owner approval required: `{str(chain.get('owner_approval_required', False)).lower()}`",
                  ]
              )
          else:
              lines.extend(["", "Worker chain: `not run`"])

          lines.extend(
              [
                  "",
                  "Safety:",
                  "",
                  "- No public copy was applied.",
                  "- No public content, backlog, PRs, or production state were modified.",
                  "- /approve-proposal records owner approval for rendered specs only; it does not apply content.",
                  "- /preview-apply renders a no-write preview only; it does not apply content.",
                  "- Planned manifest creation is allowed only by /approve-manifest.",
                  f"- Workflow run: {workflow_url}",
              ]
          )
          payload = json.dumps({"body": "\n".join(lines)}).encode("utf-8")
          request = urllib.request.Request(
              f"{api_url}/repos/{repo}/issues/{issue_number}/comments",
              data=payload,
              method="POST",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              response.read()
          PY

      - name: Upload owner decision artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-owner-decision-${{ github.run_number }}
          path: |
            automation/reports/llm-owner-decision-gha/
            automation/reports/llm-owner-intake-gha/
            automation/reports/llm-owner-run-plan-gha/
            automation/reports/llm-owner-manifest-gha/
            automation/reports/llm-owner-lifecycle-gha/
            automation/reports/llm-owner-proposal-approval-gha/
            automation/reports/llm-owner-apply-preview-gha/
            automation/reports/llm-worker-chain-gha/
            automation/reports/llm-owner-decision-chains/
            automation/reports/*.proposed.md
            automation/reports/*.exact-proposals.json
            automation/reports/*.exact-proposals.md
            automation/reports/*.apply-preview.md
            automation/manifests/
          if-no-files-found: ignore

      - name: Commit owner handoff artifacts
        if: success()
        run: |
          if [[ -n "$(git status --porcelain automation/reports/llm-topic-decision-*.json automation/reports/llm-topic-decision-*.md automation/reports/llm-intake-*.json automation/reports/llm-intake-*.md automation/reports/llm-worker-run-plan-*.json automation/reports/llm-worker-run-plan-*.md automation/reports/*.brief.md automation/reports/*.patch.md automation/reports/*.proposed.md automation/reports/*.exact-proposals.json automation/reports/*.exact-proposals.md automation/reports/*.apply-preview.md automation/reports/llm-owner-decision-chains automation/manifests)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add automation/reports/llm-topic-decision-*.json automation/reports/llm-topic-decision-*.md || true
            git add automation/reports/llm-intake-*.json automation/reports/llm-intake-*.md || true
            git add automation/reports/llm-worker-run-plan-*.json automation/reports/llm-worker-run-plan-*.md || true
            git add automation/reports/*.brief.md automation/reports/*.patch.md || true
            git add automation/reports/*.proposed.md automation/reports/*.exact-proposals.json automation/reports/*.exact-proposals.md || true
            git add automation/reports/*.apply-preview.md || true
            git add automation/reports/llm-owner-decision-chains || true
            git add automation/manifests || true
            git commit -m "chore(llm): record owner handoff artifacts"
            for i in 1 2 3; do
              git pull --rebase origin main
              if git push; then
                exit 0
              fi
              sleep 2
            done
            exit 1
          else
            echo "No topic decision artifact changes."
          fi

      - name: Refresh owner issue lifecycle view
        if: success()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [[ -f automation/reports/llm-owner-digest.json && -f automation/reports/llm-owner-digest.md ]]; then
            python3 automation/pipeline.py llm-owner-issue \
              --repository "$GITHUB_REPOSITORY" \
              --run-url "$WORKFLOW_RUN_URL" \
              --manifest-dir automation/manifests \
              --reports-dir automation/reports \
              --json
          else
            echo "No owner digest artifacts found; skipping issue body refresh."
          fi
