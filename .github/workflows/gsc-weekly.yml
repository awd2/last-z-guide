name: GSC weekly report

on:
  workflow_dispatch: {}
  schedule:
    - cron: "25 6 * * 1"

concurrency:
  group: gsc-weekly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Authenticate to Google Search Console
        id: gsc_auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GSC_SA_KEY }}
          token_format: "access_token"
          access_token_scopes: "https://www.googleapis.com/auth/webmasters.readonly"
          create_credentials_file: false

      - name: Run GSC weekly report
        env:
          GSC_ACCESS_TOKEN: ${{ steps.gsc_auth.outputs.access_token }}
          GSC_PROPERTY: ${{ secrets.GSC_PROPERTY }}
          GSC_ROWS: "250"
        run: python scripts/gsc_daily.py

      - name: Commit & push (if changed)
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(gsc): weekly report"
            for i in 1 2 3; do
              git pull --rebase origin main
              if git push; then
                exit 0
              fi
              sleep 2
            done
            exit 1
          else
            echo "No changes."
          fi
